<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>肿瘤智能检测系统 | 专业版</title>
    <style>
        /* ========== 全局重置：方正、简约、成熟 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
            background: #eef2f5;
            min-height: 100vh;
            padding: 24px;
        }

        /* 所有容器、卡片、按钮均采用直角矩形 */
        .page {
            max-width: 1200px;
            margin: 0 auto;
            display: none;
        }
        .page.active {
            display: block;
        }

        /* 卡片：直角，干净阴影 */
        .card {
            background: #ffffff;
            border: 1px solid #d4dce3;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
            padding: 28px 32px;
            margin-bottom: 24px;
        }

        /* 所有按钮直角 */
        button, .btn, .user-btn, .login-btn, .file-label, .logout-full, .feedback-btn, .submit-feedback {
            border-radius: 0px;
            font-weight: 500;
        }

        /* 顶部导航栏 */
        .top-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }
        .user-btn {
            background: #ffffff;
            color: #2c5f8a;
            border: 1px solid #bacddc;
            padding: 8px 22px;
            font-size: 14px;
            cursor: pointer;
        }
        .user-btn:hover {
            background: #f4f8fc;
            border-color: #8aaec2;
        }

        /* ========== 登录页面 ========== */
        .login-container {
            max-width: 460px;
            margin: 60px auto;
            text-align: left;
        }
        .login-container h2 {
            font-size: 1.8rem;
            color: #1a3e60;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .login-container .sub {
            color: #6a8aaa;
            margin-bottom: 28px;
            font-size: 0.9rem;
        }
        .input-group {
            margin-bottom: 18px;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbdae6;
            background: #fff;
            font-size: 0.95rem;
            border-radius: 0px;
            outline: none;
        }
        .input-group select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%236a8aaa' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 16px center;
        }
        .input-group input:focus, .input-group select:focus {
            border-color: #2c5f8a;
            box-shadow: none;
        }
        .login-btn {
            width: 100%;
            background: #2c5f8a;
            color: white;
            padding: 12px;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 8px;
        }
        .login-btn:hover {
            background: #1f4a6e;
        }
        .err-msg {
            color: #c23d3d;
            margin-top: 16px;
            font-size: 0.8rem;
        }
        .demo-hint {
            margin-top: 20px;
            font-size: 12px;
            color: #8aaec2;
            border-top: 1px solid #e2e8f0;
            padding-top: 16px;
        }

        /* ========== 检测主页样式 ========== */
        .detect-header h2 {
            font-size: 1.6rem;
            font-weight: 500;
            color: #1a3e60;
        }
        .badge {
            background: #eef3fc;
            color: #2c5f8a;
            padding: 4px 12px;
            font-size: 0.7rem;
            margin-left: 12px;
            font-weight: normal;
            border: 1px solid #d0dee9;
        }
        .upload-area {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 18px;
            margin: 24px 0 20px;
        }
        .file-label {
            background: #2c5f8a;
            color: white;
            padding: 8px 24px;
            cursor: pointer;
            font-size: 0.9rem;
            border: none;
            display: inline-block;
        }
        .file-label:hover {
            background: #1f4a6e;
        }
        #fileInput {
            display: none;
        }
        .file-name {
            color: #2c5f8a;
            background: #f4f8fc;
            padding: 6px 18px;
            border: 1px solid #d4dee8;
            font-size: 0.85rem;
        }
        .filter-panel {
            background: #f8fafc;
            border: 1px solid #dce4ec;
            padding: 20px 24px;
            margin: 20px 0 18px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
        }
        .filter-select {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .filter-select label {
            font-weight: 500;
            color: #1f486b;
        }
        select {
            padding: 8px 20px;
            border: 1px solid #cbdae6;
            background: white;
            font-size: 0.9rem;
            border-radius: 0px;
            cursor: pointer;
        }
        .action-group {
            display: flex;
            gap: 12px;
        }
        button {
            background: #2c5f8a;
            color: white;
            border: none;
            padding: 8px 22px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        button:disabled {
            background: #b8cfdf;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: #ffffff;
            color: #1f486b;
            border: 1px solid #cbdae6;
        }
        .btn-secondary:hover {
            background: #f0f5fa;
        }
        .preview-container {
            background: #f9fbfd;
            border: 1px solid #e2e8f0;
            padding: 24px;
            text-align: center;
            margin: 20px 0;
            min-height: 280px;
        }
        #previewImg {
            max-width: 100%;
            max-height: 360px;
            object-fit: contain;
            background: #eef2f6;
            display: none;
        }
        .note {
            font-size: 0.75rem;
            color: #5f7f9e;
            margin: 8px 0;
        }
        #resultArea {
            background: #f4f9ff;
            border-left: 3px solid #2c5f8a;
            padding: 18px 24px;
            margin-top: 24px;
            display: none;
            border: 1px solid #dce6f0;
        }
        .result-highlight {
            font-weight: 700;
            color: #1a4d7c;
            font-size: 1.1rem;
        }
        .footer-note {
            text-align: right;
            font-size: 0.7rem;
            color: #7c98b3;
            margin-top: 12px;
            border-top: 1px solid #e2e8f0;
            padding-top: 12px;
        }

        /* ========== 个人中心 ========== */
        .profile-card {
            padding: 0;
        }
        .profile-header {
            text-align: left;
            padding-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .avatar-large {
            width: 64px;
            height: 64px;
            background: #eef3fc;
            color: #2c5f8a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 500;
            border: 1px solid #cbdae6;
        }
        .profile-header h3 {
            font-size: 1.3rem;
            font-weight: 500;
            color: #1a3e60;
        }
        .info-item {
            display: flex;
            margin: 14px 0;
            font-size: 0.9rem;
            color: #2c3e50;
            padding: 8px 0;
            border-bottom: 1px solid #f0f3f7;
        }
        .info-label {
            width: 100px;
            color: #6a8aaa;
            font-weight: 500;
        }
        .info-value {
            flex: 1;
            color: #1f2f3e;
        }
        .logout-full {
            width: 100%;
            background: #ffffff;
            border: 1px solid #d0dde9;
            color: #c23d3d;
            margin-top: 28px;
            padding: 10px;
            cursor: pointer;
        }
        .logout-full:hover {
            background: #fff5f5;
            border-color: #c23d3d;
        }
        /* 反馈按钮样式 */
        .feedback-btn {
            background: #ffffff;
            border: 1px solid #2c5f8a;
            color: #2c5f8a;
            padding: 10px;
            width: 100%;
            margin-top: 16px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .feedback-btn:hover {
            background: #eef3fc;
        }

        /* ========== 反馈页面样式 ========== */
        .feedback-card {
            max-width: 680px;
            margin: 20px auto;
        }
        .feedback-title {
            font-size: 1.4rem;
            font-weight: 500;
            color: #1a3e60;
            margin-bottom: 6px;
        }
        .feedback-sub {
            color: #6a8aaa;
            margin-bottom: 24px;
            font-size: 0.85rem;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 12px;
        }
        .feedback-textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid #cbdae6;
            font-family: inherit;
            font-size: 0.9rem;
            resize: vertical;
            min-height: 130px;
            margin-bottom: 20px;
            outline: none;
        }
        .feedback-textarea:focus, .feedback-input:focus {
            border-color: #2c5f8a;
        }
        .feedback-input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cbdae6;
            margin-bottom: 20px;
            font-size: 0.9rem;
            outline: none;
        }
        .submit-feedback {
            background: #2c5f8a;
            color: white;
            border: none;
            padding: 10px 28px;
            cursor: pointer;
            font-size: 0.9rem;
            width: auto;
            min-width: 120px;
        }
        .submit-feedback:hover {
            background: #1f4a6e;
        }
        .feedback-status {
            margin-top: 18px;
            font-size: 0.8rem;
            color: #2c7a4d;
        }
        .back-home-feedback {
            background: none;
            border: 1px solid #bacddc;
            color: #2c5f8a;
            padding: 8px 22px;
            margin-bottom: 20px;
            display: inline-block;
        }
        .back-home-feedback:hover {
            background: #f0f5fa;
        }

        @media (max-width: 720px) {
            .card { padding: 20px; }
            .filter-panel { flex-direction: column; align-items: stretch; }
            .profile-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

<!-- ================= 1. 登录页面 ================= -->
<div id="loginPage" class="page active">
    <div class="login-container card">
        <h2>肿瘤智能检测系统</h2>
        <div class="sub">图像滤波预处理 · 辅助分析平台</div>
        <div class="input-group">
            <input type="text" id="username" placeholder="用户名" autocomplete="off">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="密码">
        </div>
        <div class="input-group">
            <select id="hospital">
                <option value="协和医院 · 影像中心">协和医院 · 影像中心</option>
                <option value="华西医院 · 放射科">华西医院 · 放射科</option>
                <option value="复旦大学附属肿瘤医院">复旦大学附属肿瘤医院</option>
                <option value="中山医院 · 核医学科">中山医院 · 核医学科</option>
                <option value="仁济医院 · 超声科">仁济医院 · 超声科</option>
            </select>
        </div>
        <button class="login-btn" onclick="handleLogin()">登录系统</button>
        <div id="loginError" class="err-msg"></div>
        <div class="demo-hint"></div>
    </div>
</div>

<!-- ================= 2. 检测主页 ================= -->
<div id="homePage" class="page">
    <div class="top-bar">
        <button class="user-btn" onclick="goToProfile()">个人中心</button>
    </div>
    <div class="card">
        <div class="detect-header">
            <h2>医学图像分析 <span class="badge">滤波预处理 | AI模拟评估</span></h2>
            <p style="color: #4f6f8c; margin-top: 8px; font-size: 0.85rem;">上传影像，应用滤波，执行分析</p>
        </div>

        <div class="upload-area">
            <label class="file-label">
                选择文件
                <input type="file" id="fileInput" accept="image/*">
            </label>
            <span id="fileName" class="file-name">未选择文件</span>
        </div>

        <div class="filter-panel">
            <div class="filter-select">
                <label>滤波算法</label>
                <select id="filterType">
                    <option value="gaussian">高斯滤波 (平滑降噪)</option>
                    <option value="median">中值滤波 (椒盐噪声)</option>
                    <option value="bilateral">双边滤波 (保边去噪)</option>
                </select>
            </div>
            <div class="action-group">
                <button id="applyFilterBtn" class="btn-secondary" disabled>应用滤波</button>
                <button id="resetImageBtn" class="btn-secondary" disabled>重置图像</button>
            </div>
        </div>

        <div class="preview-container">
            <img id="previewImg" src="" alt="影像预览区域">
            <div id="previewPlaceholder" style="color:#7a9bc2;">等待上传影像 (CT / MRI / X光)</div>
        </div>
        <p class="note">双边滤波计算量较大，处理时请稍候。滤波后图像会更新预览。</p>

        <div style="display: flex; justify-content: center; margin: 16px 0 8px;">
            <button id="detectBtn" style="padding: 10px 32px;" disabled>开始检测</button>
        </div>

        <div id="resultArea">
            <div>检测结论：<span id="resultText">待分析</span></div>
            <div style="margin-top: 8px;">置信度：<span class="result-highlight" id="confidenceValue">--</span></div>
            <div style="font-size:0.75rem; color:#6a8aaa; margin-top: 10px;">模拟结果仅供科研参考</div>
        </div>
    </div>
    <div class="footer-note">
        基于前端Canvas实现滤波算法 | 专业医疗演示版本
    </div>
</div>

<!-- ================= 3. 个人中心 (已移除分析次数) ================= -->
<div id="profilePage" class="page">
    <div class="top-bar">
        <button class="user-btn" onclick="goBackHome()">返回主页</button>
    </div>
    <div class="card" style="padding: 28px 32px;">
        <div class="profile-header">
            <div class="avatar-large" id="profileAvatar">张</div>
            <div>
                <h3 id="profileName">张三</h3>
            </div>
        </div>
        <div class="info-item">
            <span class="info-label">账号ID</span>
            <span class="info-value" id="profileId">-</span>
        </div>
        <div class="info-item">
            <span class="info-label">所属医院</span>
            <span class="info-value" id="profileHospital">协和医院 · 影像中心</span>
        </div>
        <!-- 已移除分析次数 -->
        <div class="info-item">
            <span class="info-label">联系方式</span>
            <span class="info-value">zhang.san@oncotech.com</span>
        </div>
        <!-- 反馈按钮 -->
        <button class="feedback-btn" onclick="goToFeedback()">反馈建议</button>
        <button class="logout-full" onclick="handleLogout()">退出登录</button>
    </div>
</div>

<!-- ================= 4. 反馈页面 ================= -->
<div id="feedbackPage" class="page">
    <div class="top-bar">
        <button class="user-btn" onclick="goBackHomeFromFeedback()">返回主页</button>
    </div>
    <div class="card feedback-card">
        <div class="feedback-title">意见反馈</div>
        <div class="feedback-sub">我们非常重视您的使用体验，请留下宝贵建议</div>
        
        <div class="input-group" style="margin-bottom: 12px;">
            <textarea id="feedbackContent" class="feedback-textarea" placeholder="请填写您的反馈内容（例如：功能建议、问题报告、改进意见等）..."></textarea>
        </div>
        <div class="input-group" style="margin-bottom: 12px;">
            <input type="text" id="feedbackContact" class="feedback-input" placeholder="联系方式（邮箱/手机号，选填）">
        </div>
        <div style="display: flex; justify-content: flex-end; margin-top: 8px;">
            <button class="submit-feedback" onclick="submitFeedback()">提交反馈</button>
        </div>
        <div id="feedbackStatusMsg" class="feedback-status"></div>
        <div style="margin-top: 24px; font-size: 0.7rem; color: #8aaec2; text-align: center; border-top: 1px solid #e2e8f0; padding-top: 16px;">
            感谢您的支持，我们会认真对待每一条反馈
        </div>
    </div>
</div>

<script>
    // ==================== 全局变量 ====================
    let currentUser = { 
        username: '张三', 
        id: '',
        hospital: '协和医院 · 影像中心'
    };
    let originalFile = null;
    let originalImageUrl = null;
    let isProcessing = false;

    // DOM 元素
    const loginPage = document.getElementById('loginPage');
    const homePage = document.getElementById('homePage');
    const profilePage = document.getElementById('profilePage');
    const feedbackPage = document.getElementById('feedbackPage');
    
    const fileInput = document.getElementById('fileInput');
    const fileNameSpan = document.getElementById('fileName');
    const previewImg = document.getElementById('previewImg');
    const previewPlaceholder = document.getElementById('previewPlaceholder');
    const filterType = document.getElementById('filterType');
    const applyFilterBtn = document.getElementById('applyFilterBtn');
    const resetImageBtn = document.getElementById('resetImageBtn');
    const detectBtn = document.getElementById('detectBtn');
    const resultArea = document.getElementById('resultArea');
    const resultTextSpan = document.getElementById('resultText');
    const confidenceSpan = document.getElementById('confidenceValue');

    // 个人中心元素
    const profileAvatar = document.getElementById('profileAvatar');
    const profileNameSpan = document.getElementById('profileName');
    const profileIdSpan = document.getElementById('profileId');
    const profileHospitalSpan = document.getElementById('profileHospital');

    // 清除之前的登录状态（确保每次刷新都看到登录页）
    localStorage.removeItem('tumorLoggedUser');

    // ========== 登录/登出 ==========
    window.handleLogin = function() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const hospital = document.getElementById('hospital').value;
        const errorDiv = document.getElementById('loginError');
        
        if (username === '111' && password === '333') {
            currentUser = {
                username: '张三',
                rawName: username,
                id: 'DOC-' + Math.floor(Math.random() * 10000),
                hospital: hospital
            };
            localStorage.setItem('tumorLoggedUser', JSON.stringify(currentUser));
            showHomePage();
        } else {
            errorDiv.innerText = '账号或密码错误';
        }
    };

    function showHomePage() {
        loginPage.classList.remove('active');
        homePage.classList.add('active');
        profilePage.classList.remove('active');
        feedbackPage.classList.remove('active');
        resetDetectionUI();
        updateProfileUI();
    }

    window.handleLogout = function() {
        localStorage.removeItem('tumorLoggedUser');
        if (originalImageUrl && originalImageUrl.startsWith('blob:')) {
            URL.revokeObjectURL(originalImageUrl);
        }
        originalFile = null;
        originalImageUrl = null;
        // 重置登录页输入框
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        document.getElementById('loginError').innerText = '';
        document.getElementById('hospital').value = '协和医院 · 影像中心';
        // 显示登录页，隐藏其他
        loginPage.classList.add('active');
        homePage.classList.remove('active');
        profilePage.classList.remove('active');
        feedbackPage.classList.remove('active');
    };

    function updateProfileUI() {
        if (currentUser) {
            profileAvatar.innerText = '张';
            profileNameSpan.innerText = '张三';
            profileIdSpan.innerText = currentUser.id || 'DOC-2025';
            profileHospitalSpan.innerText = currentUser.hospital || '协和医院 · 影像中心';
        }
    }

    // 移除分析次数相关方法，仅保留必要UI同步
    function resetDetectionUI() {
        if (originalImageUrl && originalImageUrl.startsWith('blob:')) {
            URL.revokeObjectURL(originalImageUrl);
        }
        originalFile = null;
        originalImageUrl = null;
        previewImg.src = '';
        previewImg.style.display = 'none';
        previewPlaceholder.style.display = 'block';
        fileNameSpan.innerText = '未选择文件';
        applyFilterBtn.disabled = true;
        resetImageBtn.disabled = true;
        detectBtn.disabled = true;
        resultArea.style.display = 'none';
    }

    window.goToProfile = function() {
        homePage.classList.remove('active');
        profilePage.classList.add('active');
        feedbackPage.classList.remove('active');
        updateProfileUI();
    };
    
    window.goBackHome = function() {
        profilePage.classList.remove('active');
        homePage.classList.add('active');
        feedbackPage.classList.remove('active');
    };
    
    // 跳转到反馈页面
    window.goToFeedback = function() {
        profilePage.classList.remove('active');
        homePage.classList.remove('active');
        feedbackPage.classList.add('active');
        // 清空之前的状态消息和输入框
        document.getElementById('feedbackContent').value = '';
        document.getElementById('feedbackContact').value = '';
        document.getElementById('feedbackStatusMsg').innerHTML = '';
    };
    
    // 从反馈页面返回主页（保留在主页，不跳个人中心）
    window.goBackHomeFromFeedback = function() {
        feedbackPage.classList.remove('active');
        homePage.classList.add('active');
        profilePage.classList.remove('active');
        // 重置反馈状态
        document.getElementById('feedbackStatusMsg').innerHTML = '';
    };
    
    // 提交反馈逻辑
    window.submitFeedback = function() {
        const content = document.getElementById('feedbackContent').value.trim();
        const contact = document.getElementById('feedbackContact').value.trim();
        const statusDiv = document.getElementById('feedbackStatusMsg');
        
        if (!content) {
            statusDiv.innerHTML = '<span style="color:#c23d3d;">请填写反馈内容后再提交</span>';
            return;
        }
        // 模拟提交成功（实际可对接后端，此处前端模拟）
        console.log('反馈已提交:', { content, contact, user: currentUser.username, hospital: currentUser.hospital });
        statusDiv.innerHTML = '<span style="color:#2c7a4d;">✓ 感谢您的反馈，我们会尽快处理！</span>';
        // 可选: 清空表单，但保留成功提示
        document.getElementById('feedbackContent').value = '';
        document.getElementById('feedbackContact').value = '';
        // 3秒后自动清除提示，但不跳转
        setTimeout(() => {
            if (statusDiv.innerHTML.includes('感谢您的反馈')) {
                statusDiv.innerHTML = '';
            }
        }, 4000);
    };

    // ========== 图像处理核心 ==========
    function setPreviewFromFile(file) {
        if (!file) return;
        if (originalImageUrl && originalImageUrl.startsWith('blob:')) {
            URL.revokeObjectURL(originalImageUrl);
        }
        const url = URL.createObjectURL(file);
        previewImg.src = url;
        originalImageUrl = url;
        originalFile = file;
        previewImg.style.display = 'block';
        previewPlaceholder.style.display = 'none';
        
        previewImg.onload = () => {
            applyFilterBtn.disabled = false;
            resetImageBtn.disabled = false;
            detectBtn.disabled = false;
            resultArea.style.display = 'none';
        };
        previewImg.onerror = () => {
            alert('图像文件无效，请重新选择');
            applyFilterBtn.disabled = true;
            resetImageBtn.disabled = true;
            detectBtn.disabled = true;
        };
    }

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) {
            resetDetectionUI();
            return;
        }
        fileNameSpan.innerText = file.name;
        setPreviewFromFile(file);
    };

    resetImageBtn.onclick = () => {
        if (!originalFile) {
            alert('无原始图像');
            return;
        }
        if (isProcessing) return;
        if (originalImageUrl) URL.revokeObjectURL(originalImageUrl);
        const newUrl = URL.createObjectURL(originalFile);
        previewImg.src = newUrl;
        originalImageUrl = newUrl;
        resultArea.style.display = 'none';
        applyFilterBtn.disabled = false;
        resetImageBtn.disabled = false;
        detectBtn.disabled = false;
    };

    function getImageDataFromImg(img) {
        return new Promise((resolve, reject) => {
            if (!img.complete || img.naturalWidth === 0) {
                reject(new Error('图像未加载'));
                return;
            }
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            ctx.drawImage(img, 0, 0);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            resolve({ imageData, canvas, ctx });
        });
    }

    function updatePreviewWithImageData(imageData, originalCanvas) {
        const canvas = originalCanvas || document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = imageData.width;
        canvas.height = imageData.height;
        ctx.putImageData(imageData, 0, 0);
        previewImg.src = canvas.toDataURL('image/png');
    }

    // 高斯滤波
    function applyGaussianFilter(imageData) {
        const { width, height, data } = imageData;
        const src = new Uint8ClampedArray(data);
        const dst = new Uint8ClampedArray(data.length);
        const kernel = [[1,4,7,4,1],[4,16,26,16,4],[7,26,41,26,7],[4,16,26,16,4],[1,4,7,4,1]];
        const radius = 2, kernelSum = 273;
        for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
                let r = 0, g = 0, b = 0;
                for (let ky = -radius; ky <= radius; ky++) {
                    for (let kx = -radius; kx <= radius; kx++) {
                        const px = Math.min(width-1, Math.max(0, x+kx));
                        const py = Math.min(height-1, Math.max(0, y+ky));
                        const idx = (py*width+px)*4;
                        const w = kernel[ky+radius][kx+radius];
                        r += src[idx] * w;
                        g += src[idx+1] * w;
                        b += src[idx+2] * w;
                    }
                }
                const dstIdx = (y*width+x)*4;
                dst[dstIdx] = r/kernelSum;
                dst[dstIdx+1] = g/kernelSum;
                dst[dstIdx+2] = b/kernelSum;
                dst[dstIdx+3] = src[dstIdx+3];
            }
        }
        return new ImageData(dst, width, height);
    }

    // 中值滤波
    function applyMedianFilter(imageData) {
        const { width, height, data } = imageData;
        const src = new Uint8ClampedArray(data);
        const dst = new Uint8ClampedArray(data.length);
        for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
                let windowR=[], windowG=[], windowB=[];
                for (let dy=-1; dy<=1; dy++) {
                    for (let dx=-1; dx<=1; dx++) {
                        const px = Math.min(width-1, Math.max(0, x+dx));
                        const py = Math.min(height-1, Math.max(0, y+dy));
                        const idx = (py*width+px)*4;
                        windowR.push(src[idx]); windowG.push(src[idx+1]); windowB.push(src[idx+2]);
                    }
                }
                windowR.sort((a,b)=>a-b); windowG.sort((a,b)=>a-b); windowB.sort((a,b)=>a-b);
                const dstIdx = (y*width+x)*4;
                dst[dstIdx]=windowR[4]; dst[dstIdx+1]=windowG[4]; dst[dstIdx+2]=windowB[4]; dst[dstIdx+3]=src[dstIdx+3];
            }
        }
        return new ImageData(dst, width, height);
    }

    // 双边滤波
    function applyBilateralFilter(imageData) {
        const { width, height, data } = imageData;
        const src = new Uint8ClampedArray(data);
        const dst = new Uint8ClampedArray(data.length);
        const radius = 3, sigmaSpace = 3, sigmaRange = 30;
        const twoSigmaSpace2 = 2*sigmaSpace*sigmaSpace;
        const twoSigmaRange2 = 2*sigmaRange*sigmaRange;
        let spaceWeights = [];
        for (let dy=-radius; dy<=radius; dy++) {
            for (let dx=-radius; dx<=radius; dx++) {
                spaceWeights.push(Math.exp(-(dx*dx+dy*dy)/twoSigmaSpace2));
            }
        }
        for (let y=0; y<height; y++) {
            for (let x=0; x<width; x++) {
                const centerIdx = (y*width+x)*4;
                const cr=src[centerIdx], cg=src[centerIdx+1], cb=src[centerIdx+2];
                let sumR=0,sumG=0,sumB=0, totalWeight=0, idxW=0;
                for (let dy=-radius; dy<=radius; dy++) {
                    const py = Math.min(height-1, Math.max(0, y+dy));
                    for (let dx=-radius; dx<=radius; dx++) {
                        const px = Math.min(width-1, Math.max(0, x+dx));
                        const idx = (py*width+px)*4;
                        const dr = src[idx]-cr, dg = src[idx+1]-cg, db = src[idx+2]-cb;
                        const rangeW = Math.exp(-(dr*dr+dg*dg+db*db)/twoSigmaRange2);
                        const w = spaceWeights[idxW++] * rangeW;
                        sumR += src[idx]*w; sumG += src[idx+1]*w; sumB += src[idx+2]*w;
                        totalWeight += w;
                    }
                }
                const dstIdx = (y*width+x)*4;
                dst[dstIdx] = sumR/totalWeight; dst[dstIdx+1]=sumG/totalWeight; dst[dstIdx+2]=sumB/totalWeight; dst[dstIdx+3]=src[dstIdx+3];
            }
        }
        return new ImageData(dst, width, height);
    }

    async function handleApplyFilter() {
        if (isProcessing) return;
        if (!previewImg.src || previewImg.style.display === 'none') {
            alert('请先上传图像');
            return;
        }
        const filter = filterType.value;
        isProcessing = true;
        applyFilterBtn.disabled = true;
        resetImageBtn.disabled = true;
        detectBtn.disabled = true;
        applyFilterBtn.innerText = '处理中';
        try {
            const { imageData, canvas } = await getImageDataFromImg(previewImg);
            let processed;
            if (filter === 'gaussian') processed = applyGaussianFilter(imageData);
            else if (filter === 'median') processed = applyMedianFilter(imageData);
            else processed = applyBilateralFilter(imageData);
            updatePreviewWithImageData(processed, canvas);
            resultArea.style.display = 'none';
        } catch(e) { alert('滤波失败: ' + e.message); }
        finally {
            isProcessing = false;
            applyFilterBtn.disabled = false;
            resetImageBtn.disabled = false;
            detectBtn.disabled = false;
            applyFilterBtn.innerText = '应用滤波';
        }
    }

    async function runDetection() {
        if (!previewImg.src || previewImg.style.display === 'none') {
            alert('请先上传医学图像');
            return;
        }
        detectBtn.disabled = true;
        detectBtn.innerText = '检测中';
        setTimeout(() => {
            const confidence = (Math.random() * 12 + 88).toFixed(1);
            confidenceSpan.innerText = confidence + '%';
            resultTextSpan.innerText = confidence > 93 ? '高风险可疑区域' : '低风险区域';
            resultArea.style.display = 'block';
            detectBtn.innerText = '开始检测';
            detectBtn.disabled = false;
            // 分析次数已完全移除，不再累加
        }, 1000);
    }

    applyFilterBtn.onclick = handleApplyFilter;
    detectBtn.onclick = runDetection;
</script>
