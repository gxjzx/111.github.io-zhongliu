:root{
  --primary:#0284c7;--primary-dark:#0369a1;--primary-light:#e0f2fe;
  --red:#ef4444;--amber:#f59e0b;--green:#22c55e;
  --gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;
  --gray-400:#94a3b8;--gray-500:#64748b;--gray-700:#334155;--gray-900:#0f172a;
}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s;outline:none;}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(2,132,199,.3);}
.btn-primary:hover{background:var(--primary-dark);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.btn-ghost{background:#fff;color:var(--primary);border:1.5px solid #bae6fd;}
.btn-ghost:hover{background:var(--primary-light);}
.card{background:#fff;border-radius:16px;box-shadow:0 1px 8px rgba(0,0,0,.07);border:1px solid #f1f5f9;padding:24px;}
.input{width:100%;padding:12px 16px;border:1.5px solid var(--gray-200);border-radius:10px;font-size:15px;color:var(--gray-700);outline:none;transition:border .2s;background:#fff;}
.input:focus{border-color:var(--primary);}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;}
.badge-red{background:#fee2e2;color:#b91c1c;}
.badge-amber{background:#fef3c7;color:#92400e;}
.badge-green{background:#dcfce7;color:#166534;}
.badge-blue{background:#e0f2fe;color:#0369a1;}
/* Spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .8s linear infinite;}
/* Progress */
.progress-bar{height:8px;background:#e2e8f0;border-radius:8px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#38bdf8,#0284c7);border-radius:8px;transition:width .3s;}
/* Fade in */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .4s ease both;}
/* Dropdown */
.dropdown{position:absolute;right:0;top:calc(100% + 8px);background:#fff;border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,.12);border:1px solid #f1f5f9;width:220px;z-index:999;overflow:hidden;}
.dropdown-item{display:flex;align-items:center;gap:10px;padding:11px 16px;font-size:14px;color:var(--gray-700);cursor:pointer;transition:background .15s;}
.dropdown-item:hover{background:#f8fafc;}
.dropdown-item.danger{color:#ef4444;}
.dropdown-item.danger:hover{background:#fff5f5;}
/* Image box */
.img-box{aspect-ratio:5/4;background:#0f172a;border-radius:14px;overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative;}
.img-box img{width:100%;height:100%;object-fit:contain;}
.img-placeholder{text-align:center;color:#475569;}
.img-placeholder svg{margin-bottom:12px;opacity:.4;}
/* Grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
@media(max-width:768px){.grid2{grid-template-columns:1fr;}.grid3{grid-template-columns:1fr 1fr;}.grid4{grid-template-columns:1fr 1fr;}}
/* Topbar */
.topbar{background:#fff;border-bottom:1px solid #f1f5f9;box-shadow:0 1px 4px rgba(0,0,0,.05);position:sticky;top:0;z-index:100;}
.topbar-inner{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:64px;}
/* Page wrapper */
.page{max-width:1200px;margin:0 auto;padding:32px 24px;}
/* Profile sidebar */
.profile-grid{display:grid;grid-template-columns:300px 1fr;gap:24px;}
@media(max-width:900px){.profile-grid{grid-template-columns:1fr;}}
/* Result card */
.result-card{border-radius:16px;padding:24px;border:1.5px solid;}
.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0;}
@media(max-width:600px){.result-grid{grid-template-columns:1fr 1fr;}}
/* Stat mini card */
.stat-card{padding:16px;border-radius:12px;text-align:center;background:#fff;border:1px solid #f1f5f9;box-shadow:0 1px 4px rgba(0,0,0,.05);}
/* History row */
.history-row{display:flex;align-items:center;justify-content:space-between;padding:12px;border-radius:12px;background:#f8fafc;transition:background .15s;cursor:pointer;}
.history-row:hover{background:#f1f5f9;}
/* Login page */
.login-bg{min-height:100vh;background:transparent !important;background-image:none !important;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;}
.login-card{background:rgba(255,255,255,.97);border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.2);padding:36px;width:100%;max-width:420px;position:relative;z-index:1;}
.tab-switch{display:flex;background:#f1f5f9;border-radius:12px;padding:4px;margin-bottom:28px;}
.tab-btn{flex:1;padding:9px;border-radius:9px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;background:transparent;color:#64748b;}
.tab-btn.active{background:#fff;color:var(--primary);box-shadow:0 1px 4px rgba(0,0,0,.1);}

/* 半透卡片增强背景融合 */
.card, .topbar, .stat-card, .login-card, .result-card, .profile-grid .card, [class*="result-card"] {
  background-color: rgba(255, 255, 255, 0.92) !important;
  backdrop-filter: blur(0px);
}
.img-box {
  background: rgba(10, 25, 47, 0.75) !important;
}
.history-row {
  background: rgba(248, 250, 252, 0.85);
}
.history-row:hover {
  background: rgba(241, 245, 249, 0.9);
}
/* 隐私保护标记样式 */
.privacy-badge {
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(2, 132, 199, 0.08);
  backdrop-filter: blur(4px);
  border-radius: 48px;
  padding: 8px 20px;
  font-size: 13px;
  font-weight: 500;
  color: #0f172a;
  border: 1px solid rgba(2, 132, 199, 0.25);
  width: fit-content;
}
.privacy-footer {
  margin-top: 32px;
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 20px;
}
.privacy-footer .privacy-badge {
  background: rgba(255,255,255,0.75);
}
/* Toggle switch样式 */
.switch {
  position: relative;
  display: inline-block;
  width: 44px;
  height: 24px;
}
.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}
.slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: #cbd5e1;
  transition: .3s;
  border-radius: 24px;
}
.slider:before {
  position: absolute;
  content: "";
  height: 18px;
  width: 18px;
  left: 3px;
  bottom: 3px;
  background-color: white;
  transition: .3s;
  border-radius: 50%;
}
input:checked + .slider {
  background-color: #0284c7;
}
input:checked + .slider:before {
  transform: translateX(20px);
}
</style>
</head>

// ──────────────────── 随机生成分析结果 ────────────────────
function getRandomResult() {
  const types = ['malignant', 'suspicious', 'benign'];
  const weights = [0.35, 0.35, 0.3];
  const random = Math.random();
  let cumulative = 0;
  let type = 'benign';
  for (let i = 0; i < types.length; i++) {
    cumulative += weights[i];
    if (random < cumulative) { type = types[i]; break; }
  }
  let confidence;
  if (type === 'malignant') confidence = 0.85 + Math.random() * 0.13;
  else if (type === 'suspicious') confidence = 0.65 + Math.random() * 0.23;
  else confidence = 0.90 + Math.random() * 0.09;
  confidence = Math.min(0.99, Math.max(0.65, confidence));
  const sizes = ['1.2cm × 0.9cm', '1.8cm × 1.3cm', '2.1cm × 1.6cm', '2.5cm × 2.0cm','3.0cm × 2.4cm', '1.5cm × 1.1cm', '2.8cm × 2.2cm', '0.9cm × 0.7cm'];
  const size = sizes[Math.floor(Math.random() * sizes.length)];
  const locations = ['右额叶深部', '左颞叶', '小脑蚓部', '脑干左侧', '右顶叶','左枕叶', '右侧脑室旁', '左侧基底节区', '右肺上叶', '左肺下叶'];
  const location = locations[Math.floor(Math.random() * locations.length)];
  return { type, confidence, size, location };
}

// ──────────────────── 标注画布 ────────────────────
function annotateImage(src, result) {
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = img.width; c.height = img.height;
      const ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0);
      const colorMap = { malignant:'#ef4444', suspicious:'#f59e0b', benign:'#22c55e' };
      const color = colorMap[result.type];
      const cx = img.width * 0.51, cy = img.height * 0.46;
      const rx = img.width * 0.17, ry = img.height * 0.17;
      ctx.beginPath(); ctx.ellipse(cx,cy,rx+14,ry+14,0,0,Math.PI*2);
      ctx.strokeStyle = color+'33'; ctx.lineWidth=12; ctx.stroke();
      ctx.beginPath(); ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
      ctx.strokeStyle = color; ctx.lineWidth=2.5; ctx.setLineDash([8,4]); ctx.stroke(); ctx.setLineDash([]);
      [[-1,-1],[1,-1],[1,1],[-1,1]].forEach(([sx,sy])=>{
        const ex = cx + sx*rx, ey = cy + sy*ry;
        ctx.strokeStyle=color; ctx.lineWidth=3;
        ctx.beginPath(); ctx.moveTo(ex,ey); ctx.lineTo(ex-sx*16,ey); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(ex,ey); ctx.lineTo(ex,ey-sy*16); ctx.stroke();
      });
      const labels = { malignant:'恶性肿瘤', suspicious:'疑似病变', benign:'良性结节' };
      const label = `${labels[result.type]}  ${(result.confidence*100).toFixed(0)}%`;
      const lx = cx + rx - 8, ly = cy - ry - 44, lw = 140, lh = 30;
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.roundRect(lx,ly,lw,lh,8); ctx.fill();
      ctx.fillStyle='#fff'; ctx.font='bold 13px sans-serif'; ctx.textAlign='left';
      ctx.fillText(label, lx+10, ly+20);
      ctx.globalAlpha=1;
      ctx.fillStyle='rgba(0,0,0,.65)'; ctx.fillRect(0, img.height-44, img.width, 44);
      ctx.fillStyle='#e2e8f0'; ctx.font='12px monospace'; ctx.textAlign='left';
      ctx.fillText(`大小: ${result.size}  |  位置: ${result.location}  |  置信度: ${(result.confidence*100).toFixed(1)}%`, 14, img.height-16);
      resolve(c.toDataURL('image/jpeg',0.92));
    };
    img.onerror = () => resolve(src);
    img.src = src;
  });
}

  const [progress, setProgress] = useState(0);
  const [result, setResult] = useState(null);
  const loadFile = e => { const f = e.target.files[0]; if(!f) return; setFileName(f.name); const r = new FileReader(); r.onload = ev => { setBeforeImg(ev.target.result); setAfterImg(null); setResult(null); }; r.readAsDataURL(f); };
  const useSample = () => { setBeforeImg(SAMPLE_B64); setFileName('sample_brain_mri.dcm'); setAfterImg(null); setResult(null); };
  const analyze = async () => {
    if(!beforeImg) return;
    setAnalyzing(true); setProgress(0); setAfterImg(null); setResult(null);
    const iv = setInterval(()=>setProgress(p=>{ if(p>=88){clearInterval(iv);return 88;} return p+Math.random()*16; }), 280);
    await new Promise(r=>setTimeout(r,3000));
    clearInterval(iv); setProgress(100);
    const res = getRandomResult();
    setResult(res);
    const ann = await annotateImage(beforeImg, res);
    setAfterImg(ann);
    setAnalyzing(false);
  };
  const resultCfg = { malignant:{ label:'恶性肿瘤', icon:<IconAlertCircle/>, color:'#dc2626', bg:'#fff1f2', border:'#fecdd3', badge:'badge-red' }, suspicious:{ label:'疑似病变', icon:<IconTriangle/>, color:'#d97706', bg:'#fffbeb', border:'#fde68a', badge:'badge-amber' }, benign:{ label:'良性结节', icon:<IconCheck/>, color:'#16a34a', bg:'#f0fdf4', border:'#bbf7d0', badge:'badge-green' } };
  const cfg = result ? resultCfg[result.type] : null;
  return (
    <div>
      <TopBar user={user} onLogout={onLogout} onGoProfile={onGoProfile} onGoDetection={()=>{}}/>
      <div className="page">
        <div style={{marginBottom:28}}><h2 style={{fontSize:22,fontWeight:800,color:'white'}}>肿瘤智能检测</h2><p style={{color:'white',marginTop:4,fontSize:14}}>上传医学影像，AI 将自动识别并标注潜在病变区域</p></div>
        <div className="card" style={{marginBottom:24}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12,marginBottom:16}}><div style={{display:'flex',alignItems:'center',gap:8,fontWeight:600,fontSize:15,color:'#1e293b'}}><IconUpload size={18} color="#0284c7"/> 上传影像文件</div><button className="btn btn-ghost" style={{fontSize:13,padding:'7px 16px'}} onClick={useSample}>使用示例影像</button></div>
          <div onClick={()=>fileRef.current.click()} style={{border:`2px dashed ${beforeImg?'#7dd3fc':'#cbd5e1'}`,borderRadius:14,padding:'36px 24px',textAlign:'center',cursor:'pointer',background:beforeImg?'#f0f9ff':'#fafafa',transition:'all .2s'}}><input ref={fileRef} type="file" accept="image/*,.dcm" style={{display:'none'}} onChange={loadFile}/>{beforeImg ? (<div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10}}><IconImage size={24} color="#0284c7"/><div><div style={{fontWeight:600,color:'#0284c7',fontSize:15}}>{fileName}</div><div style={{fontSize:12,color:'#94a3b8',marginTop:2}}>点击更换文件</div></div></div>) : (<><div style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:56,height:56,background:'#e0f2fe',borderRadius:16,marginBottom:12}}><IconUpload size={26} color="#0284c7"/></div><div style={{fontWeight:600,color:'#334155',marginBottom:4}}>点击上传或拖拽文件至此处</div><div style={{fontSize:13,color:'#94a3b8'}}>支持 JPEG、PNG、DICOM (.dcm) 格式</div></>)}</div>
          {/* 本地处理强提示 */}
          <div style={{ marginTop: 16, background: '#e6f7ec', borderRadius: 12, padding: '12px 16px', display: 'flex', alignItems: 'center', gap: 12 }}><IconShieldCheck size={20} color="#16a34a" /><span style={{ fontSize: 13, color: '#166534', fontWeight: 500 }}>AI 模型在本地运行，影像数据绝不离开您的设备 — 符合医疗隐私规范</span></div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:16}}>
            <span className="badge badge-blue" style={{display:'inline-flex',alignItems:'center',gap:4}}><IconShield size={12} color="#0369a1"/> 端侧推理 · 数据零上云</span>
            <button className="btn btn-primary" onClick={analyze} disabled={!beforeImg||analyzing}>{analyzing ? (<><svg className="spin" width="17" height="17" viewBox="0 0 24 24" fill="none"><circle opacity=".25" cx="12" cy="12" r="10" stroke="white" strokeWidth="4"/><path opacity=".75" fill="white" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg> 分析中 {Math.round(progress)}%</>) : <><IconActivity size={17} color="#fff"/> 开始 AI 分析</>}</button>
          </div>
          {analyzing && (<div style={{marginTop:12}}><div className="progress-bar"><div className="progress-fill" style={{width:`${progress}%`}}/></div><div style={{textAlign:'center',fontSize:12,color:'#94a3b8',marginTop:6}}>正在进行 AI 影像分析，请稍候...</div></div>)}
        </div>
        <div className="grid2" style={{marginBottom:24}}>
          <div className="card"><div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}><div style={{width:10,height:10,borderRadius:'50%',background:'#94a3b8'}}/><span style={{fontWeight:600,fontSize:14,color:'#475569'}}>分析前 · 原始影像</span></div><div className="img-box">{beforeImg ? <img src={beforeImg} alt="原始影像"/> : (<div className="img-placeholder"><IconImage size={48}/><div style={{fontSize:14,marginTop:4}}>暂无影像</div><div style={{fontSize:12,marginTop:4,color:'#64748b'}}>请上传医学影像文件</div></div>)}</div></div>
          <div className="card"><div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}><div style={{width:10,height:10,borderRadius:'50%',background:afterImg?'#0284c7':'#e2e8f0'}}/><span style={{fontWeight:600,fontSize:14,color:'#475569'}}>分析后 · AI 标注结果</span>{afterImg && cfg && <span className={`badge ${cfg.badge}`} style={{marginLeft:'auto'}}>{cfg.label}</span>}</div><div className="img-box">{afterImg ? <img src={afterImg} alt="分析结果"/> : analyzing ? (<div className="img-placeholder"><svg className="spin" width="52" height="52" viewBox="0 0 24 24" fill="none" style={{marginBottom:12}}><circle opacity=".15" cx="12" cy="12" r="10" stroke="#38bdf8" strokeWidth="3"/><path opacity=".8" fill="#38bdf8" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg><div style={{fontSize:14,color:'#64748b'}}>AI 正在分析影像...</div></div>) : (<div className="img-placeholder"><IconBarChart size={48}/><div style={{fontSize:14,marginTop:4}}>等待分析</div><div style={{fontSize:12,marginTop:4,color:'#64748b'}}>点击"开始 AI 分析"后显示结果</div></div>)}</div></div>
        </div>
        {result && cfg && (<div className="result-card fade-in" style={{background:cfg.bg,borderColor:cfg.border,marginBottom:24}}><div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12,marginBottom:16}}><div style={{display:'flex',alignItems:'center',gap:10}}>{cfg.icon}<div><div style={{fontSize:18,fontWeight:800,color:cfg.color}}>{cfg.label}</div><div style={{fontSize:13,color:'#64748b'}}>AI 置信度: {(result.confidence*100).toFixed(1)}%</div></div></div><div style={{display:'flex',alignItems:'center',gap:6,color:'#94a3b8',fontSize:13}}><IconClock size={15} color="#94a3b8"/> {new Date().toLocaleString('zh-CN')}</div></div><div className="result-grid">{['病灶大小', result.size],['病灶位置', result.location],['置信度', `${(result.confidence*100).toFixed(0)}%`].map(([k,v])=><div key={k} style={{background:'rgba(255,255,255,.75)',borderRadius:12,padding:14,border:'1px solid rgba(255,255,255,.9)'}}><div style={{fontSize:12,color:'#94a3b8',marginBottom:4}}>{k}</div><div style={{fontWeight:700,color:'#1e293b',fontSize:15}}>{v}</div></div>)}</div><div style={{display:'flex',gap:10,flexWrap:'wrap',marginTop:8}}><button className="btn btn-primary" style={{fontSize:13}}>导出检测报告</button><button className="btn btn-ghost" style={{fontSize:13}}>保存至记录</button></div></div>)}
        <PrivacyFooter />
      </div>
    </div>
  );
}

// ──────────────────── PROFILE PAGE (隐私设置面板) ────────────────────
const RECORDS = [
  { id:1, date:'2026-04-25 14:32', name:'brain_mri_001.dcm', type:'malignant', conf:0.914 },
  { id:2, date:'2026-04-24 09:18', name:'ct_chest_042.jpg', type:'benign', conf:0.887 },
  { id:3, date:'2026-04-23 16:55', name:'mri_abdom_107.dcm', type:'suspicious', conf:0.762 },
  { id:4, date:'2026-04-22 11:20', name:'brain_mri_098.dcm', type:'benign', conf:0.945 },
  { id:5, date:'2026-04-20 08:45', name:'pet_scan_023.dcm', type:'malignant', conf:0.891 },
];
const RBADGE = { malignant:{label:'恶性肿瘤',cls:'badge-red'}, suspicious:{label:'疑似病变',cls:'badge-amber'}, benign:{label:'良性结节',cls:'badge-green'} };
function ProfilePage({ user, onLogout, onGoDetection }) {
  const stats = { total: RECORDS.length, malignant: RECORDS.filter(r=>r.type==='malignant').length, suspicious: RECORDS.filter(r=>r.type==='suspicious').length, benign: RECORDS.filter(r=>r.type==='benign').length, avgConf: (RECORDS.reduce((a,r)=>a+r.conf,0)/RECORDS.length*100).toFixed(1) };
  const [anonEnabled, setAnonEnabled] = useState(true);
  const [autoClean, setAutoClean] = useState(true);
  const [retention, setRetention] = useState('30');
  return (
    <div>
      <TopBar user={user} onLogout={onLogout} onGoProfile={()=>{}} onGoDetection={onGoDetection}/>
      <div className="page">
        <button onClick={onGoDetection} style={{display:'flex',alignItems:'center',gap:6,fontSize:16,color:'white',background:'none',border:'none',cursor:'pointer',marginBottom:24,padding:0}}><IconArrowLeft size={17} color="white"/> 返回检测页面</button>
        <div className="profile-grid">
          <div style={{display:'flex',flexDirection:'column',gap:20}}>
            <div className="card" style={{textAlign:'center'}}><div style={{width:90,height:90,borderRadius:24,background:'linear-gradient(135deg,#38bdf8,#0284c7)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:800,fontSize:36,margin:'0 auto 16px',boxShadow:'0 6px 20px rgba(2,132,199,.35)'}}>{user.name.charAt(0)}</div><div style={{fontSize:20,fontWeight:800,color:'#0f172a'}}>{user.name}</div><div style={{fontSize:13,color:'#0284c7',fontWeight:600,marginTop:4}}>{user.role}</div><div style={{marginTop:20,display:'flex',flexDirection:'column',gap:10,textAlign:'left'}}>{[[<IconMail size={15} color="#94a3b8"/>, user.email],[<IconShield size={15} color="#94a3b8"/>, <span>账户已认证 <span className="badge badge-green" style={{float:'right'}}>已认证</span></span>],[<IconCalendar size={15} color="#94a3b8"/>, `注册时间：${user.joinDate}`]].map(([ico,txt],i)=><div key={i} style={{display:'flex',alignItems:'center',gap:8,fontSize:13,color:'#64748b'}}>{ico}{txt}</div>)}</div><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:20}}><button className="btn btn-primary" style={{fontSize:13,justifyContent:'center'}}><IconEdit size={14} color="#fff"/> 编辑资料</button><button onClick={onLogout} style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6,fontSize:13,fontWeight:600,padding:'10px',borderRadius:10,border:'1.5px solid #fecdd3',color:'#ef4444',background:'#fff',cursor:'pointer'}}><IconLogOut size={14} color="#ef4444"/> 退出</button></div></div>
            <div className="card"><div style={{display:'flex',alignItems:'center',gap:8,fontWeight:600,marginBottom:16,color:'#1e293b'}}><IconBarChart size={17} color="#0284c7"/> 检测统计</div>{[['总检测次数',stats.total,'#0f172a'],['平均置信度',`${stats.avgConf}%`,'#0284c7']].map(([k,v,c])=><div key={k} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid #f1f5f9',fontSize:14}}><span style={{color:'#64748b'}}>{k}</span><span style={{fontWeight:700,color:c}}>{v}</span></div>)}<div style={{marginTop:12,display:'flex',flexDirection:'column',gap:8}}>{[['#ef4444','恶性',stats.malignant],['#f59e0b','疑似',stats.suspicious],['#22c55e','良性',stats.benign]].map(([clr,lbl,val])=><div key={lbl} style={{display:'flex',justifyContent:'space-between',fontSize:14}}><span style={{display:'flex',alignItems:'center',gap:6,color:'#64748b'}}><span style={{width:8,height:8,borderRadius:'50%',background:clr,display:'inline-block'}}/>{lbl}</span><span style={{fontWeight:700,color:'#1e293b'}}>{val}</span></div>)}</div></div>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:20}}>
            <div className="grid4">{[
              {label:'总检测',val:stats.total,ico:<IconActivity size={19} color="#0284c7"/>,bg:'#e0f2fe',c:'#0284c7'},
              {label:'恶性',val:stats.malignant,ico:<IconBarChart size={19} color="#ef4444"/>,bg:'#fee2e2',c:'#dc2626'},
              {label:'疑似',val:stats.suspicious,ico:<IconBarChart size={19} color="#f59e0b"/>,bg:'#fef3c7',c:'#d97706'},
              {label:'良性',val:stats.benign,ico:<IconBarChart size={19} color="#22c55e"/>,bg:'#dcfce7',c:'#16a34a'},
            ].map(s=><div key={s.label} className="stat-card"><div style={{width:40,height:40,borderRadius:12,background:s.bg,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 10px'}}>{s.ico}</div><div style={{fontSize:24,fontWeight:800,color:s.c}}>{s.val}</div><div style={{fontSize:12,color:'#94a3b8',marginTop:2}}>{s.label}</div></div>)}</div>
            <div className="card"><div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18}}><div style={{display:'flex',alignItems:'center',gap:8,fontWeight:600,color:'#1e293b'}}><IconClock size={17} color="#0284c7"/> 检测历史记录</div><span style={{fontSize:12,color:'#94a3b8'}}>最近 {RECORDS.length} 条</span></div><div style={{display:'flex',flexDirection:'column',gap:8}}>{RECORDS.map(r=>{ const b = RBADGE[r.type]; return (<div key={r.id} className="history-row"><div style={{display:'flex',alignItems:'center',gap:12,minWidth:0}}><div style={{width:40,height:40,borderRadius:12,background:'#f1f5f9',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><IconActivity size={18} color="#94a3b8"/></div><div style={{minWidth:0}}><div style={{fontSize:14,fontWeight:500,color:'#1e293b',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{r.name}</div><div style={{fontSize:12,color:'#94a3b8',marginTop:2}}>{r.date}</div></div></div><div style={{display:'flex',alignItems:'center',gap:10,flexShrink:0,marginLeft:12}}><span style={{fontSize:12,color:'#94a3b8'}}>{(r.conf*100).toFixed(0)}%</span><span className={`badge ${b.cls}`}>{b.label}</span></div></div>); })}</div><button style={{width:'100%',marginTop:14,padding:'10px',background:'none',border:'none',color:'#0284c7',fontSize:13,fontWeight:600,cursor:'pointer',borderRadius:10,transition:'background .15s'}} onMouseEnter={e=>e.target.style.background='#e0f2fe'} onMouseLeave={e=>e.target.style.background='none'}>查看全部记录 →</button></div>
            {/* 新增隐私设置卡片 */}
            <div className="card"><div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}><IconShieldCheck size={18} color="#0284c7"/><span style={{fontWeight:700,fontSize:16}}>隐私与数据管理</span></div><div style={{display:'flex',flexDirection:'column',gap:16}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontSize:14,color:'#334155'}}>匿名化处理影像元数据</span><label className="switch"><input type="checkbox" checked={anonEnabled} onChange={e=>setAnonEnabled(e.target.checked)}/><span className="slider"></span></label></div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontSize:14,color:'#334155'}}>分析完成后自动删除上传的临时文件</span><label className="switch"><input type="checkbox" checked={autoClean} onChange={e=>setAutoClean(e.target.checked)}/><span className="slider"></span></label></div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontSize:14,color:'#334155'}}>保留本地检测日志时间</span><select value={retention} onChange={e=>setRetention(e.target.value)} style={{border:'1px solid #e2e8f0',borderRadius:8,padding:'6px 10px',fontSize:13}}><option value="30">30天</option><option value="90">90天</option><option value="never">永不</option></select></div>
              <div style={{display:'flex',gap:12,marginTop:4}}><button className="btn btn-ghost" style={{fontSize:13}} onClick={()=>alert("导出功能演示：您的数据已打包为JSON文件（模拟）")}>导出我的数据</button><button className="btn" style={{fontSize:13,background:'#fff1f2',color:'#e11d48',border:'1px solid #fecdd3'}} onClick={()=>{if(confirm("此操作将清除所有本地历史记录，不可恢复。确定吗？")) alert("已清除所有记录（演示）");}}><IconTrash size={14}/> 清除全部历史记录</button></div>
            </div></div>
          </div>
        </div>
        <PrivacyFooter />
      </div>
    </div>
  );
}

// ──────────────────── APP ────────────────────
function App() {
  const [user, setUser] = useState(null);
  const [page, setPage] = useState('login');
  const login = u => { setUser(u); setPage('detection'); };
  const logout = () => { setUser(null); setPage('login'); };
  if (page === 'login') return <LoginPage onLogin={login}/>;
  if (page === 'profile') return <ProfilePage user={user} onLogout={logout} onGoDetection={()=>setPage('detection')}/>;
  return <DetectionPage user={user} onLogout={logout} onGoProfile={()=>setPage('profile')}/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
